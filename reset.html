<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resetear Todo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>body{font-family:sans-serif;background-color:#121212;color:#e0d6c2;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center}.container{padding:40px;background-color:#1e1e1e;border-radius:12px}button{padding:15px;background-color:#c0392b;color:white;border:none;border-radius:8px;font-size:1.2rem;cursor:pointer}#message{margin-top:20px;color:#27ae60}</style>
</head>
<body>
    <div class="container">
        <h1>Herramienta de Limpieza</h1>
        <p>Esto borrará tu progreso y la contraseña de acceso. Tendrás que volver a hacer Login.</p>
        <button onclick="resetAll()">Cerrar Sesión y Borrar Progreso</button>
        <div id="message"></div>
    </div>
    <script>
        function resetAll() {
            // 1. Borrar progreso del juego
            localStorage.removeItem('progresoJuego');
            
            // 2. Borrar la LLAVE MAESTRA (El nuevo sistema)
            localStorage.removeItem('clave_guardada');
            
            // 3. Borrar el sistema antiguo por si acaso
            localStorage.removeItem('acceso_manuscrito');
            
            document.getElementById('message').textContent = "¡Datos borrados! Redirigiendo...";
            
            // 4. Te manda al index (y como no tienes clave, te saltará al login)
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
