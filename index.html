    <script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>

        .lang-link:hover { background-color: #c0392b; border-color: #c0392b; transform: scale(1.05); }

</head>
<body>

    <h1>Elige tu idioma</h1>
    
    <a href="instrucciones-es.html" class="lang-link">Español</a>

            <button onclick="closeMasterModal()" style="background:#c0392b; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-family:'Cinzel', serif; text-transform:uppercase;">Cerrar</button>
        </div>
    </div>

    <script>
        function openMasterModal() { document.getElementById('master-modal').style.display = 'flex'; }
        function closeMasterModal() { document.getElementById('master-modal').style.display = 'none'; }
