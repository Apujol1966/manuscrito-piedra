<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access - El Manuscrito</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #000; --text-main: #e0d6c2; --gold: #d4af37; --error: #c0392b; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Lato', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 20px; font-size: 1.8rem; line-height: 1.4; }
        h1 span { display: block; margin-top: 5px; }
        .instructions { font-size: 1rem; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        .instructions span { display: block; margin-bottom: 5px; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 320px; }
        input { width: 100%; padding: 15px; font-size: 1.2rem; text-align: center; border-radius: 5px; border: 2px solid var(--gold); background: #000; color: white; box-sizing: border-box; margin-bottom: 20px; font-family: 'Cinzel', serif; text-transform: uppercase; }
        button { width: 100%; padding: 15px; font-size: 1rem; font-weight: bold; background-color: var(--gold); color: #000; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-family: 'Cinzel', serif; }
        #error { color: var(--error); margin-top: 15px; display: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>EL MANUSCRITO DE PIEDRA<span>The Stone Manuscript</span></h1>
    <div class="login-box">
        <div class="instructions">
            <span>Introduce tu código de acceso:</span>
            <span style="color: #bbb;">Enter your access code:</span>
        </div>
        <input type="text" id="password" placeholder="CODE / CÓDIGO">
        <button onclick="entrar()">ENTRAR / ENTER</button>
        <div id="error">Código incorrecto / Invalid code</div>
    </div>
    <script>
        function entrar() {
            const input = document.getElementById('password').value.trim().toUpperCase();
            if (typeof CLAVE_ACTUAL !== 'undefined' && input === CLAVE_ACTUAL) {
                localStorage.setItem('clave_guardada', input);
                window.location.href = 'index.html';
            } else { document.getElementById('error').style.display = 'block'; }
        }
        document.getElementById("password").addEventListener("keypress", function(event) { if (event.key === "Enter") entrar(); });
    </script>
</body>
</html>
